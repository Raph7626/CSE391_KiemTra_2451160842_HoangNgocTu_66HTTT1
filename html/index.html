<!DOCTYPE html>
<html lang="vi">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản Lý Hồ Sơ Chuyển Đổi Số</title>
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="./bootstrap-5.0.2-dist/css/bootstrap.min.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        .card { transition: all 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <!-- Phần body giữ nguyên như cũ của bạn, chỉ cần đảm bảo có id="recordList" như dưới -->

    <header>
        <nav class="navbar navbar-light bg-info shadow-sm mb-4 justify-content-center display-flex align-items-center">
        <div class="container">
            <a class="navbar-brand fw-bold lg">☁️ Hệ Thống Quản Lý Hồ Sơ Chuyển Đổi Số</a>
            <span class="text-muted small">Sở giáo dục và đào tạo - Ứng dụng quản lý tiến trình số các trường học</span>
        </div>
    </nav>
    </header>

    <main>
    <div class="container">
        <div class="row">
            <div class="col-lg-12 mb-4 ">
                <div class="d-flex justify-content-center mb-3 flex-wrap gap-2">
                    <button class="btn btn-outline-primary active" data-filter="all">Tất cả</button>
                    <button class="btn btn-outline-secondary" data-filter="Not Started">Chưa bắt đầu</button>
                    <button class="btn btn-outline-success" data-filter="Done">Hoàn thành</button>
                    <button class="btn btn-outline-warning" data-filter="In Progress">Đang triển khai</button> 
                </div>
            </div>            
        </div>

        <div class="row">
            <!-- Form -->
            <div class="col-lg-4 mb-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-plus"></i> Thêm hồ sơ mới</h5>
                    </div>
                    <div class="card-body">
                        <form id="addForm">
                            <!-- Nội dung form giữ nguyên -->
                            <div class="mb-3">
                                <label class="form-label">Tên trường</label>
                                <input type="text" class="form-control" id="tenTruong" required placeholder="Đại Học Thủy Lợi">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Đơn vị quản lý</label>
                                <select class="form-select" id="donVi" required>
                                    <option value="">-- Chọn đơn vị --</option>
                                    <option value="pgd_HD">Phòng Giáo dục Hải Dương</option>
                                    <option value="pgd_HN">Phòng Giáo dục Hà Nội</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Trạng thái chuyển đổi</label>
                                <select class="form-select" id="trangThai" required>
                                    <option value="">-- Chọn trạng thái --</option>
                                    <option value="Done">Hoàn thành</option>
                                    <option value="In Progress">Đang triển khai</option>
                                    <option value="Not Started">Chưa bắt đầu</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mô tả tiến độ</label>
                                <textarea class="form-control" id="moTa" rows="3" placeholder="Mô tả tiến trình"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-plus"></i> Thêm hồ sơ
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Danh sách -->
            <div class="col-lg-8">
                <div class="row" id="recordList"></div>
            </div>
        </div>
    </div>
    </main>

    <script src="./bootstrap-5.0.2-dist/js/bootstrap.bundle.min.js"></script>
    <script src="./data/data.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
