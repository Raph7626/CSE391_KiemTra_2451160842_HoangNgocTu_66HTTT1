<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Hồ sơ Chuyển đổi Số</title>
    <link href="./bootstrap-5.0.2-dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .header { background: linear-gradient(90deg, #1e3a8a, #3b82f6); color: white; }
        .card { transition: all 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container py-4">
        

        <div class="row">
            <div class="col-lg-4 mb-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-plus"></i> Thêm hồ sơ mới</h5>
                    </div>
                    <div class="card-body">
                        <form id="addForm">
                            <div class="mb-3">
                                <label class="form-label">Tên trường</label>
                                <input type="text" class="form-control" id="tenTruong" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Đơn vị quản lý</label>
                                <input type="text" class="form-control" id="donVi" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Trạng thái chuyển đổi</label>
                                <select class="form-select" id="trangThai" required>
                                    <option value="">-- Chọn trạng thái --</option>
                                    <option value="Hoàn thành">Hoàn thành</option>
                                    <option value="Đang triển khai">Đang triển khai</option>
                                    <option value="Chưa bắt đầu">Chưa bắt đầu</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mô tả tiến độ</label>
                                <textarea class="form-control" id="moTa" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-plus"></i> Thêm hồ sơ
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="d-flex justify-content-between mb-3">
                    <div>
                        <button class="btn btn-outline-primary me-2 active" data-filter="all">Tất cả</button>
                        <button class="btn btn-outline-success me-2" data-filter="Hoàn thành">Hoàn thành</button>
                        <button class="btn btn-outline-warning me-2" data-filter="Đang triển khai">Đang triển khai</button>
                        <button class="btn btn-outline-secondary" data-filter="Chưa bắt đầu">Chưa bắt đầu</button>
                    </div>
                    <span class="badge bg-primary fs-6" id="count">0 hồ sơ</span>
                </div>

                <div class="row" id="recordList">
                </div>
            </div>
        </div>
    </div>

    <script src="../bootstrap-5.0.2-dist/js/bootstrap.bundle.min.js"></script>
    <script src="data/data.js"></script>
    <script src="app/app.js"></script>
</body>
</html>
